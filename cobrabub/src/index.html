<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CobraBub - AI-Powered IDE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Title Bar -->
        <div class="title-bar">
            <div class="title-bar-drag-region"></div>
            <div class="window-controls">
                <button class="window-control" id="minimize-btn">−</button>
                <button class="window-control" id="maximize-btn">□</button>
                <button class="window-control" id="close-btn">×</button>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Sidebar - File Explorer -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>CobraBub</h2>
                    <button class="icon-btn" id="refresh-files" title="Refresh">🔄</button>
                </div>
                <div class="sidebar-actions">
                    <button class="action-btn" id="open-folder-btn">📁 Open Folder</button>
                    <button class="action-btn" id="new-file-btn" title="New File">📄</button>
                </div>
                <div class="file-tree" id="file-tree">
                    <div class="empty-state">No folder opened</div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <!-- Tab Bar -->
                <div class="tab-bar" id="tab-bar">
                    <div class="tabs" id="tabs"></div>
                </div>

                <!-- Editor Area -->
                <div class="editor-container">
                    <div id="editor-wrapper">
                        <textarea id="code-editor" placeholder="Open a file to start editing..." spellcheck="false"></textarea>
                    </div>
                    <div class="editor-status" id="editor-status">
                        <span id="cursor-position">Ln 1, Col 1</span>
                        <span id="file-language">Plain Text</span>
                    </div>
                </div>
            </main>

            <!-- Agent Panel -->
            <aside class="agent-panel" id="agent-panel">
                <div class="panel-header">
                    <h3>🤖 AI Agent</h3>
                    <div class="panel-controls">
                        <button class="icon-btn" id="agent-settings" title="Settings">⚙️</button>
                        <button class="icon-btn" id="toggle-agent-panel" title="Collapse">◀</button>
                    </div>
                </div>

                <!-- Model Selection -->
                <div class="model-section">
                    <select id="model-type">
                        <option value="openai">OpenAI API</option>
                        <option value="anthropic">Anthropic API</option>
                        <option value="local">Local Model</option>
                        <option value="custom">Custom API</option>
                    </select>
                    <button class="action-btn small" id="configure-model">Configure</button>
                </div>

                <!-- Chat/Agent Interface -->
                <div class="agent-chat" id="agent-chat">
                    <div class="chat-messages" id="chat-messages">
                        <div class="message system">
                            Welcome to CobraBub! Select a model and start chatting with your AI assistant.
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <textarea id="chat-input" placeholder="Ask me anything about your code..." rows="3"></textarea>
                        <div class="chat-actions">
                            <button class="action-btn primary" id="send-message">Send</button>
                            <button class="action-btn" id="run-agent">Run Agent</button>
                        </div>
                    </div>
                </div>

                <!-- Agent Tasks -->
                <div class="agent-tasks" id="agent-tasks">
                    <h4>Active Tasks</h4>
                    <div class="task-list" id="task-list"></div>
                </div>
            </aside>
        </div>

        <!-- Status Bar -->
        <footer class="status-bar">
            <div class="status-left">
                <span id="project-name">No Project</span>
                <span id="connection-status" class="status-indicator">●</span>
            </div>
            <div class="status-right">
                <span id="agent-status">Agent: Disconnected</span>
                <span id="model-status">Model: None</span>
            </div>
        </footer>
    </div>

    <!-- Configuration Modal -->
    <div class="modal" id="config-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Model Configuration</h3>
                <button class="close-btn" id="close-modal">×</button>
            </div>
            <div class="modal-body">
                <form id="config-form">
                    <div class="form-group">
                        <label for="api-key">API Key:</label>
                        <input type="password" id="api-key" placeholder="Enter your API key">
                    </div>
                    <div class="form-group">
                        <label for="base-url">Base URL (for custom/local):</label>
                        <input type="text" id="base-url" placeholder="http://localhost:8000">
                    </div>
                    <div class="form-group">
                        <label for="model-name">Model Name:</label>
                        <input type="text" id="model-name" placeholder="gpt-4, claude-3, etc.">
                    </div>
                    <div class="form-group">
                        <label for="local-model-path">Local Model Path:</label>
                        <input type="text" id="local-model-path" placeholder="/path/to/model">
                    </div>
                    <div class="form-group">
                        <label for="agent-server-url">Agent Server URL:</label>
                        <input type="text" id="agent-server-url" placeholder="ws://localhost:8765">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="action-btn" id="cancel-config">Cancel</button>
                <button class="action-btn primary" id="save-config">Save Configuration</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
